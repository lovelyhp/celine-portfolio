<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Céline Choi — AI 기획자 · 빌더 · 실무자. Portfolio." />
    <title>Céline Choi — Portfolio</title>

    <link
      rel="stylesheet"
      as="style"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&family=Manrope:wght@400;500;600;700;800&display=swap"
    />
    <script>
      // 첫 페인트 전에 테마 스탬프. 기본은 항상 라이트(배포판과 동일),
      // 다크는 사용자가 토글로 선택했을 때만 (키 v2: 과거 자동 저장값 무효화)
      (function () {
        try {
          var saved = localStorage.getItem('theme-v2');
          document.documentElement.dataset.theme = saved === 'dark' ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
