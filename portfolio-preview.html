puting 석사 과정을 이수 중입니다.",'프랑스어·불문학 학사 출신의 비전공자이지만, 지난 1년간 행정 현장의 단순 반복 업무를 AI로 바꾸는 일에 몰두해왔습니다. Flask·GAS·D3.js·React로 직접 도구를 만들었고, 최근에는 Claude Code로 6층 빌딩 구조의 "OIA 자동화 사무실"을 구축해 14명의 AI 비서가 각자 부서 폴더를 지키는 시스템으로 통합했습니다.',"기획이 문서에만 남는 걸 견디지 못합니다. 실제 배포되어 동료와 학생이 쓰고, 수치로 효과가 증명되고, 조직의 일하는 방식 자체를 바꾸는 결과물에 집착합니다.","지금은 이 실험을 더 큰 무대에서 증폭시킬 곳을 찾고 있습니다."]},featured:{number:"II",title:"Featured Work",intro:"주요 작업 두 가지를 서사로 풀어놓았습니다. ← → 키로 챕터를 넘기며 읽어주세요."},oiaBuilding:{id:"oia-building",index:"01",year:"2026",title:"OIA 자동화 사무실",subtitle:"14명의 AI 비서가 작동하는 가상 6층 빌딩",stack:["Claude Code","Flask","GAS","Claude API","D3.js"],slides:[{kind:"cover",heading:"OIA 자동화 사무실",sub:"14명의 AI 비서가 작동하는 가상 6층 빌딩",body:"연세대 국제처의 분산된 14개 부서 폴더를 파일 시스템 이벤트로 연결해, 각 폴더의 AI 페르소나가 자신의 업무를 수행하는 통합 자동화 시스템. 실행자에서 지휘자로 역할을 바꾼 1년간의 기록.",imageSrc:null,imageCaption:"OIA 빌딩 전체 시각화",imageHint:"FLOOR_PLAN의 6층 빌딩 렌더 이미지 (캐릭터·엘리베이터·유부까지 보이는 메인 비주얼)"},{kind:"section",tag:"PROBLEM",heading:"하루 60통, 주당 25시간.",body:["매일 오전 9시, 받은 메일함엔 최소 60통의 새 이메일이 쌓여 있었습니다. 105개 유럽 파트너 대학의 담당자, 연세 학생, 파트너교 학생, 신규 협정 제안, 갱신 논의 — 한국어·영어·프랑스어가 섞인 메일이 매일 쏟아졌습니다. 하루라도 대응을 미루면 미확인 메일은 150~200통으로 불어났습니다.","한 학기 200건 이상의 ECTS 성적 환산, 매 학기 노미네이션 통보와 어드미션 안내, 비슷하지만 케이스마다 미묘하게 다른 FAQ 응대. 협정교 정보·학생 데이터·과거 케이스는 여러 엑셀·문서·메일에 흩어져, 한 건 처리마다 여러 창을 오갔습니다.","주당 25시간 이상이 단순 반복 업무로 사라졌고, 정작 기획·전략 업무를 할 시간은 남지 않았습니다."],imageSrc:null,imageCaption:"받은 메일함 스크린샷 (150+ 미확인 상태)",imageHint:"민감정보 가리고 미확인 메일 개수 뱃지가 보이는 Gmail 스크린샷"},{kind:"section",tag:"APPROACH · I",heading:"시작은 단순했다. 퇴근하고 싶었다.",body:['처음부터 "조직 자동화 플랫폼"을 만들려던 건 아니었습니다. 가장 아픈 지점부터 도구로 만들었습니다.',"Flask + Claude API로 이메일 분류·초안 시스템. GAS + Claude API로 ECTS 환산 자동화. FAQ 챗봇, D3.js 대시보드, 노미네이션 관리 GAS 웹앱, 증명서 자동 발급 시스템. 하나씩 늘어날 때마다 업무 시간이 조금씩 되돌아왔습니다."],imageSrc:null,imageCaption:"초기 도구들의 실행 화면 모음",imageHint:"이메일 분류기 UI / ECTS 환산 결과 / FAQ 챗봇 대화 중 하나 (단일 또는 콜라주)"},{kind:"section",tag:"APPROACH · II",heading:"도구가 10개를 넘자 새로운 문제가.",body:['도구가 많아질수록 "이 일은 어떤 도구를 쓰지?"를 판단하는 것 자체가 인지 부담이 됐습니다. 각 도구는 제각각의 폴더, 제각각의 실행 방식, 제각각의 업데이트 주기를 가졌습니다.',"이 시점에 Claude Code를 만났습니다. 그리고 생각했습니다. 도구들을 한 명의 매니저가 조율하게 할 수는 없을까? 그리고 이왕이면, 진짜 사무실처럼 만들어볼까?"],imageSrc:null,imageCaption:"프로젝트 폴더 구조 다이어그램",imageHint:"14개 부서 폴더가 펼쳐진 VS Code 사이드바 스크린샷, 또는 폴더 트리 다이어그램"},{kind:"section",tag:"APPROACH · III",heading:"OIA 빌딩을 세웠습니다.",body:["Claude Code의 서브에이전트와 CLAUDE.md 페르소나 시스템으로 가상의 6층 빌딩을 지었습니다. 14개 부서 폴더를 층과 방으로 매핑하고, 각 폴더에 담당 비서를 배치했습니다. 1F Léa(협정), 2F Mail(이메일), 3F Nomi(노미), 5F Céline(총괄), 6F에는 저와 치즈 고양이 유부(Uboo).","이건 장식이 아니라 설계였습니다. 폴더 = 부서, 파일 변경 이벤트 = 비서의 상태 변화, 전체 활동량 = 유부의 순찰 속도. 파일 시스템의 추상적 이벤트를 조직 행동이라는 구체적 은유로 번역한 것입니다.","유머러스한 네이밍은 일부러 고집했습니다. 유부 회장, 서아 대표, 커피 타임, 낮잠, 야근 — 이 디테일들이 AI를 도구가 아니라 동료로 대하는 태도의 선언입니다."],imageSrc:null,imageCaption:"OIA 빌딩 상단부 (6F 대표 사무실과 유부)",imageHint:"6F 대표실 렌더 — 서아 책상, 캣휠, 캣타워, 유부가 보이는 클로즈업"},{kind:"section",tag:"APPROACH · IV",heading:"어느 오후, 마감 D-2.",body:["15시. 전 층이 풀가동입니다. 2F Mail이 54통의 이메일을 분류 중, 3F Nomi가 파리정치대학 노미네이션 12건을 처리 중, 4F Solène이 교환 밸런스를 업데이트, 1F Léa가 IP Paris MoU 갱신을 대조. 5F Céline이 전체 상황을 조망합니다. 유부는 `peak` 모드로 층 사이를 순찰합니다.",'저는 그저 Céline에게 묻습니다. "오늘 IP Paris 관련해서 내가 지금 개입해야 하는 건 뭐야?"',"예전이라면 150통의 메일을 열고, 협정 폴더를 뒤지고, 성적표를 하나씩 환산했을 것입니다. 지금은 비서들이 각자 자기 폴더를 지키고, 저는 무엇을, 누구에게, 어떤 순서로 물을지만 결정합니다."],imageSrc:null,imageCaption:"풀가동 상태의 OIA 빌딩 (peak 모드)",imageHint:"전 층에 비서들이 working 상태, 유부가 엘리베이터에서 이동 중인 상태의 스크린샷"},{kind:"section",tag:"APPROACH · V",heading:"비전공자로서 AI와 일하는 법.",body:['이 전체 시스템을 비전공자인 제가 만들 수 있었던 건, 요구사항 정의 → Claude와 페어 프로그래밍 → 실사용 → 개선이라는 루프에 정착했기 때문입니다. 저는 아키텍처 세부사항을 암기하지 않습니다. 대신 "무엇이 문제인지", "어떻게 작동해야 하는지", "지금 어디가 어색한지"를 정확히 설명합니다.',"비전공자라는 사실이 더 이상 장벽이 아니라, 업무 현장의 실제 페인포인트를 가장 잘 아는 기획자가 직접 도구를 만들 수 있다는 무기가 됐습니다."],imageSrc:null,imageCaption:"Claude Code 터미널 작업 중",imageHint:"Claude Code 실행 중인 터미널 + 에디터 분할 화면 스크린샷"},{kind:"result",tag:"RESULT",heading:"숫자로 본 변화",table:[{label:"주간 이메일 처리 시간",before:"25시간+",after:"약 8시간"},{label:"ECTS 환산 (건당)",before:"8~10분",after:"30초 이내"},{label:"학기당 ECTS 환산",before:"약 30시간",after:"약 2시간"},{label:"노미네이션 안내 메일 (학생당)",before:"15분",after:"2~3분"},{label:"미확인 메일 누적",before:"150~200통",after:"30통 이내"}],body:[{h:"솔직히 말하면, 처음엔 오히려 시간이 두 배 걸렸습니다.",p:"자동화를 기획하면서 기존 업무도 쳐내야 했기 때문입니다. 그러나 도구가 쌓이고 OIA 빌딩으로 통합된 지금 — 커피 한 잔 마실 시간에 제 비서들이 원고를 검수하고, 메일 초안을 쓰고, 성적표를 환산하고 있습니다. 저는 실행의 짐에서 놓여났을 뿐, 여전히 이 모든 것을 총괄·검토·승인하는 결정권자입니다."},{h:"시간이 생겼다는 것의 진짜 의미",p:"업무 시간에 비로소 기획과 전략에 집중할 수 있게 됐습니다. 국제처 홈페이지 개편, 협정교 DB 구축, 유럽 파트너 벤치마킹 출장 기획 — 자동화 사무실이 없었다면 시도조차 못 했을 프로젝트들입니다. 퇴근 후엔 대학원 수업과 AI 학회 스터디에 정상적으로 참여하고 있습니다."}],imageSrc:null,imageCaption:"주간 업무 시간 변화 그래프",imageHint:"이메일 처리 시간 감소 그래프 (Before/After 막대 또는 시계열 차트)"},{kind:"scenes",tag:"SCENES",heading:"세 가지 장면",scenes:["마크롱 대통령 방문 당일. 저는 의전 현장에 집중할 수 있었습니다. 그날 아침에도 Mail이 90통 넘는 메일을 분류해두었기 때문입니다.","처음으로 정시 퇴근한 날. 집에 돌아왔을 때, 유부(실제 고양이)가 평소보다 일찍 저를 반겼습니다.","석사 과정 수업에 처음으로 지각 없이 들어간 날. 강의실 맨 앞자리에 앉았습니다."],closing:{h:"아직 끝나지 않은 이야기",p:"이 시스템은 아직 저 혼자 쓰고 있습니다. 우리 조직은 AI에 여전히 보수적이고, 개인이 만든 도구를 조직 전체에 이식하는 건 다른 종류의 문제입니다. 그래서 저는 더 큰 무대를 찾고 있습니다."},imageSrc:null,imageCaption:"실제 유부 (치즈 고양이) 사진",imageHint:"유부 사진 한 장 — 잘 나온 귀여운 포즈 (편안한 톤의 마무리 이미지)"}]},univFinder:{id:"univ-finder",index:"02",year:"2025",title:"대학 검색 대시보드",subtitle:"Univ Finder — D3.js 기반 인터랙티브 웹 도구",stack:["React","D3.js","Tailwind","Google Sheets API","Netlify"],slides:[{kind:"cover",heading:"대학 검색 대시보드",sub:"Univ Finder — D3.js 기반 인터랙티브 웹 도구",body:"248개 파트너 대학 정보를 학생이 직관적으로 탐색할 수 있게 만든 대시보드. OIA의 반복 FAQ를 도구로 전환.",imageSrc:null,imageCaption:"Univ Finder 메인 화면",imageHint:"oiaunivfinder.netlify.app 메인 뷰 스크린샷 (전체 UI)"},{kind:"section",tag:"PROBLEM",heading:"매년 반복되는 같은 질문들.",body:['"제 TOEFL 92점이면 어디 갈 수 있어요?", "유럽에서 영어로 수업 듣는 학교는 어디예요?", "독일 학교 중에 공학 전공 가능한 곳이요." — 학생들은 248페이지 PDF 책자를 뒤지거나 OIA로 전화를 걸었고, 저와 동료들은 하루에도 수십 번씩 같은 답을 반복했습니다.'],imageSrc:null,imageCaption:"기존 PDF 책자의 모습",imageHint:'대학교 목록이 빼곡한 PDF 페이지 샷 — "이게 전부 텍스트였다"는 인상'},{kind:"section",tag:"APPROACH",heading:"학생이 직접 필터링할 수 있는 도구.",body:["자기 조건으로 필터링하고, 즐겨찾기하고, CSV로 내려받아 부모님·지도교수와 공유할 수 있는 대시보드를 만들기로 했습니다. D3.js + React. 지역·국가·TOEFL 점수대·배정 인원·QS 랭킹을 다차원 필터로 동시 적용. 248개 대학 데이터를 Google Sheets에서 실시간으로 로드해 업데이트 부담을 제거. 즐겨찾기는 LocalStorage에 저장되고 CSV 내보내기 지원."],imageSrc:null,imageCaption:"필터 패널과 결과 리스트",imageHint:"필터가 적용된 상태의 스크린샷 — 사이드 필터 + 결과 카드가 모두 보이는 뷰"},{kind:"result",tag:"RESULT",heading:"배포: oiaunivfinder.netlify.app",body:[{h:"",p:"학생 FAQ 문의 감소. 국제처 홈페이지 개편 시 메인 기능으로 통합 예정. 교환학생 모집 설명회 자료에 공식 소개."}],imageSrc:null,imageCaption:"즐겨찾기 + CSV 내보내기 화면",imageHint:"하트 체크된 대학들이 보이는 상태 + CSV 다운로드 버튼 강조된 스크린샷"}]},selected:{number:"III",title:"Selected Works",intro:"그 외 작업들. 프로젝트 카드를 클릭하면 상세 설명이 펼쳐집니다.",projects:[{title:"ECTS 성적 환산 자동화",year:"2025–2026",stack:["GAS","Claude API","python-docx"],body:"교환학생이 유럽 파트너교에서 받아온 성적표(ECTS 단위)를 연세대 학점으로 환산하는 작업을 자동화. 학기당 200건 이상의 반복 작업이 건당 8~10분에서 30초 이내로 단축. 대학원 진학 준비생을 위해 환산 공식 근거 영문 Certificate 표준 서식도 함께 제작.",imageCaption:"ECTS 환산 결과 스프레드시트",imageHint:"GAS가 자동 생성한 연세대 학점이 채워진 Google Sheets 스크린샷"},{title:"연세대 국제처 홈페이지 개편",year:"2026",stack:["React","TypeScript","Netlify"],body:'레거시 중심의 개발 환경에서, 기획자가 직접 React로 목업을 만들어 개발 요건 정의서와 함께 제시. 메인 통계를 "Since 1966 · 80+ Partner Countries · 740+ Partner Universities"로 재구성하고 역사 타임라인을 스크롤 인터랙션으로 풀어냄. 이 목업과 요건 정의서가 실제 개편 프로젝트의 기준선이 됨.',imageCaption:"yonsei-oia.netlify.app 메인 히어로",imageHint:"목업 사이트의 Hero + 통계 3개가 보이는 상단부 스크린샷"},{title:"협정교 DB 구축",year:"2026",stack:["Excel","Google Sheets","openpyxl","Claude Code"],body:"740여 개 해외 파트너 대학의 협정 정보를 27개 컬럼 스키마로 표준화. 공개용 8개 컬럼과 내부 관리용 19개 컬럼을 색상으로 구분하고, 주요 필드에 드롭다운 유효성 검사 적용. 향후 홈페이지 임베드와 만료 알림 자동화로 확장 예정.",imageCaption:"27컬럼 DB 스키마 (공개/내부 구분)",imageHint:"색상으로 구분된 엑셀 헤더 스크린샷 — 공개 컬럼과 내부 컬럼 경계가 보이게"},{title:"마크롱 대통령 특강 운영",year:"2026",stack:["French Delegation","Protocol","Event Ops"],body:"2026년 4월 3일 마크롱 프랑스 대통령의 연세대 특별강연 실무 총괄. 7주의 준비 기간 동안 엘리제궁·주한프랑스대사관·청와대 경호처·교내 5개 부서를 조율. 총장 환영사·학생 Q&A 기획·리허설·보도자료·PCO 수의계약 사유서까지 전 과정 기획·작성. 국내 언론 169건·프랑스 외신 보도의 성과.",imageCaption:"행사 당일 각당헌 현장",imageHint:"공개 가능한 현장 사진 1컷 — 행사장 전경 또는 총장 환영사 장면"}]},experience:{number:"IV",title:"Experience & Education",roles:[{org:"연세대학교 국제처",position:"Europe Region Exchange Program Manager",period:"2025.11 – 현재",bullets:["105개 유럽 파트너 대학과의 Exchange Program 전략·운영 총괄","2026년 4월 마크롱 프랑스 대통령 연세대 특별강연 행사 실무 총괄 (7주 내 완수)","교환 프로그램 운영 자동화 이니셔티브 주도 — Flask·GAS·React·D3.js·Claude Code","유럽 파트너 벤치마킹 출장 프로젝트 기획·지원 선정 (Sciences Po, UCL, LSE)"]},{org:"연세대학교 국제처",position:"YISS/WAY International Program Manager",period:"2024.01 – 2025.10",bullets:["YISS·WAY 40주년 기념행사 기획·운영 (Suno AI 테마송, 소셜미디어 110K+ 조회)","국제 단기 프로그램 운영 전반 — 인보이스·HTML 이메일·수강신청 검증·학사 일정","2025년 EAIE 스웨덴 컨퍼런스 참가, 노르웨이·프랑스 파트너 대학 방문"]}],education:[{school:"연세대학교 인공지능융합대학원",degree:"M.S. in AI Computing",period:"2025.09 – 재학 중",bullets:["RAG 기반 교환학생 후기 검색 시스템 팀 프로젝트","NLP Study Group — ReAct 논문 발표 (이메일 트리아지 시스템을 현장 구현 사례로 소개)"]},{school:"연세대학교",degree:"B.A. in French Language & Literature",period:"졸업 2013.08",bullets:[]}]},skills:{number:"V",title:"Skills",groups:[{heading:"AI & Development",items:"Python · Flask · Google Apps Script · Claude API · Claude Code · React · TypeScript · D3.js · Chart.js · HTML/CSS/JS · Git · Netlify"},{heading:"Product & Planning",items:"Service Design · User Research · KPI Design · Cross-functional Coordination · Technical Documentation · AI PoC Ideation & Delivery"},{heading:"Data & Automation",items:"Google Sheets · Excel · Data Visualization (D3.js, Chart.js, Tableau) · Workflow Automation · API Integration"},{heading:"Domain",items:"International Education · European University Partnerships · Government Liaison · Event Management (VVIP Protocol) · Multilingual Communication"},{heading:"Languages",items:"Korean (Native) · English (Professional) · French (Intermediate)"}]},contact:{number:"VI",title:"Contact",heading:"새로운 대화를 기다리고 있습니다.",email:"sachoi@yonsei.ac.kr",linkedin:"linkedin.com/in/seoah-choi",linkedinUrl:"https://linkedin.com/in/seoah-choi"},footer:{copyright:"© 2026 Céline Choi · 최서아 (Seo-Ah Choi)"}},Rf={meta:{nameRoman:"Céline Choi",tagline:"A planner building real change inside an administrative organization — with AI.",subtitle:`Non-CS background. Europe Region Exchange Program Manager at Yonsei University. I replace "we can't do that" with "here's how we can."`},nav:{hero:"Intro",about:"About",work:"Work",experience:"Experience",skills:"Skills",contact:"Contact"},hero:{stats:[{value:"105+",label:"European Partners Managed"},{value:"25h → 8h",label:"Weekly Email Processing Time"},{value:"15",label:"AI Personas Orchestrated"},{value:"200+",label:"ECTS Conversions / Semester, Automated"}],hint:"Use ← → arrows or scroll to explore"},about:{number:"I",title:"About",body:["I manage the exchange program with 105 European partner universities as Europe Region Exchange Program Manager at Yonsei University's Office of International Affairs. In parallel, I'm a master's student in AI Computing at the Yonsei Graduate School of AI Convergence.",`I came from a French Literature background — not CS. For the past year, I've been obsessed with transforming administrative routine into AI-powered workflows. I've built tools with Flask, Google Apps Script, D3.js, and React. Most recently, using Claude Code, I built the "OIA Automation Office": a six-floor virtual building where 14 AI secretaries each tend their own department folders.`,"I can't stand planning that stays on paper. I'm obsessed with work that actually ships, that colleagues and students actually use, whose effect is proven in numbers, and that changes how an organization works.","Now I'm looking for a larger stage to scale this experiment."]},featured:{number:"II",title:"Featured Work",intro:"Two main works, told as stories. Use ← → to advance through each chapter."},oiaBuilding:{id:"oia-building",index:"01",year:"2026",title:"OIA Automation Office",subtitle:"A virtual 6-floor building with 14 AI secretaries",stack:["Claude Code","Flask","GAS","Claude API","D3.js"],slides:[{kind:"cover",heading:"OIA Automation Office",sub:"A virtual 6-floor building with 14 AI secretaries",body:"An integrated automation system that connects 14 department folders via file-system events, where each folder's AI persona performs its own work. A one-year record of moving from executor to conductor.",imageSrc:null,imageCaption:"OIA Building — full visualization",imageHint:"Render of the 6-floor building (characters, elevator, Uboo visible)"},{kind:"section",tag:"PROBLEM",heading:"60 emails a day. 25+ hours a week.",body:["Every morning at 9 AM, at least 60 new emails waited in my inbox. European partner coordinators, Yonsei students heading abroad, inbound students, new partnership proposals, renewals — a flood of Korean, English, and French emails. Any delay, and unread count grew to 150–200.","200+ ECTS conversions per semester. Per-student admission emails. FAQ responses similar but never identical. Partner data, student data, past cases were scattered across spreadsheets, documents, and emails.","Over 25 hours per week evaporated into routine work. The time to do what actually mattered — strategy and planning — never came."],imageSrc:null,imageCaption:"Gmail inbox (150+ unread)",imageHint:"Gmail screenshot with unread badge visible, private info redacted"},{kind:"section",tag:"APPROACH · I",heading:"It started simply. I wanted to go home.",body:['I never set out to build an "organizational automation platform." I just fixed the most painful thing first.',"Flask + Claude API for email classification and drafting. GAS + Claude API for ECTS conversion. A FAQ chatbot, a D3.js dashboard, a nomination management GAS web app, an automatic certificate system. Each tool returned a little more of my time."],imageSrc:null,imageCaption:"First tools — initial interfaces",imageHint:"Screenshot of email classifier / ECTS converter / FAQ chatbot (single or collage)"},{kind:"section",tag:"APPROACH · II",heading:"Past ten tools, a new problem.",body:['The more tools I had, the heavier it became just to decide "which tool for which task?" Each lived in its own folder, with its own execution pattern, its own update cycle.',"That was when I met Claude Code. And I thought: what if one manager orchestrated all these tools? And while we're at it, why not build it like a real office?"],imageSrc:null,imageCaption:"Project folder structure",imageHint:"VS Code sidebar showing 14 department folders, or a folder tree diagram"},{kind:"section",tag:"APPROACH · III",heading:"I built the OIA Building.",body:["Using Claude Code's sub-agents and CLAUDE.md personas, I constructed a virtual 6-floor building. 14 department folders mapped to floors and rooms, each with a dedicated secretary. Léa on 1F (agreements), Mail on 2F (email), Nomi on 3F (nominations), Céline on 5F (chief). On 6F, me and Uboo, my cheese cat.","This wasn't decoration. It was design. Folder = department; file-change event = secretary state; total activity = Uboo's patrol speed. I translated abstract filesystem events into a concrete metaphor of organizational behavior.","I insisted on the playful naming. President Uboo, CEO Seo-Ah, coffee time, naps, overtime — a statement that AI should be treated as a colleague, not a tool."],imageSrc:null,imageCaption:"Upper floors of OIA Building (6F CEO office with Uboo)",imageHint:"Close-up render of the 6F suite — Seo-Ah's desk, cat wheel, cat tower, Uboo"},{kind:"section",tag:"APPROACH · IV",heading:"One afternoon, D-2.",body:["3 PM. Every floor at full capacity. Mail on 2F sorts 54 emails. Nomi on 3F processes 12 Sciences Po nominations. Solène on 4F updates the balance sheet. Léa on 1F cross-checks an IP Paris MoU. Céline on 5F surveys the whole situation. Uboo patrols in peak mode.",'I simply ask Céline: "What do I need to personally handle about IP Paris today?"',"In the past, I would have opened 150 emails, dug through the agreement folder, converted transcripts one by one. Now the secretaries tend their folders, and I only decide what, to whom, in what order to ask."],imageSrc:null,imageCaption:"OIA Building at peak activity",imageHint:"Screenshot of the building at full capacity, with all secretaries working and Uboo in the elevator"},{kind:"section",tag:"APPROACH · V",heading:"How a non-CS person works with AI.",body:[`The reason I — without a CS degree — could build this entire system is that I settled into a loop: requirement definition → pair-programming with Claude → real use → iteration. I don't memorize architecture details. I precisely describe "what the problem is," "how it should work," "what feels off right now."`,"Not having a CS degree stopped being a barrier. It became a weapon: the planner who knows the field's real pain points can build the tools directly."],imageSrc:null,imageCaption:"Claude Code session in progress",imageHint:"Terminal running Claude Code with editor view, split-screen"},{kind:"result",tag:"RESULT",heading:"Change in Numbers",table:[{label:"Weekly Email Processing Time",before:"25h+",after:"~8h"},{label:"ECTS Conversion (per case)",before:"8–10 min",after:"under 30 sec"},{label:"ECTS Conversion (per semester)",before:"~30h",after:"~2h"},{label:"Nomination Admission Email (per student)",before:"15 min",after:"2–3 min"},{label:"Unread Email Backlog",before:"150–200",after:"under 30"}],body:[{h:"Honestly — at first it took twice as long.",p:"I was building automation alongside the existing work. But now — in the time it takes me to drink a coffee, my secretaries are reviewing drafts, writing emails, converting transcripts. I've been relieved of execution, but remain the decision-maker who oversees, reviews, approves."},{h:"What having time really means",p:"During work hours, I can finally focus on planning and strategy. Website renewal, partner DB, European benchmarking trip — projects impossible without the automation office. After-hours, I attend graduate classes and AI study groups regularly."}],imageSrc:null,imageCaption:"Weekly hours before vs after",imageHint:"Bar or time-series chart showing email processing hours decline"},{kind:"scenes",tag:"SCENES",heading:"Three scenes",scenes:["On the day of President Macron's visit, I could focus on the protocol floor. That morning, Mail had already sorted over 90 emails.","The first evening I left at the proper time, Uboo (my actual cat) greeted me earlier than usual when I got home.","The first time I arrived at my master's class on time, I took a seat in the front row."],closing:{h:"The story isn't over.",p:"I'm still the only one using this system. My organization remains conservative about AI. That's why I'm looking for a larger stage."},imageSrc:null,imageCaption:"Uboo, the real cheese cat",imageHint:"A cute photo of Uboo — warm closing image"}]},univFinder:{id:"univ-finder",index:"02",year:"2025",title:"University Finder Dashboard",subtitle:"A D3.js interactive web tool",stack:["React","D3.js","Tailwind","Google Sheets API","Netlify"],slides:[{kind:"cover",heading:"University Finder Dashboard",sub:"D3.js interactive web tool",body:"A dashboard letting students intuitively explore 248 partner universities. Converts OIA's repetitive FAQ into a tool.",imageSrc:null,imageCaption:"Univ Finder main view",imageHint:"Screenshot of oiaunivfinder.netlify.app home page"},{kind:"section",tag:"PROBLEM",heading:"The same questions, every year.",body:['"With my TOEFL 92, where can I apply?" "Which European schools teach in English?" "Engineering in Germany?" — Students leafed through a 248-page PDF or called the OIA office, while my colleagues and I answered the same questions dozens of times a day.'],imageSrc:null,imageCaption:"The legacy PDF booklet",imageHint:'A page from the dense, text-heavy PDF — "this was all text"'},{kind:"section",tag:"APPROACH",heading:"A tool where students filter for themselves.",body:["A dashboard where students filter by their own criteria, save favorites, and download a CSV. Built with D3.js + React. Multi-dimensional filters — region, country, TOEFL tier, quota, QS ranking — apply simultaneously. Data pulled live from Google Sheets. Favorites saved to LocalStorage with CSV export."],imageSrc:null,imageCaption:"Filter panel and results list",imageHint:"Screenshot with filters applied — side panel + result cards visible"},{kind:"result",tag:"RESULT",heading:"Deployed at oiaunivfinder.netlify.app",body:[{h:"",p:"Reduced student FAQ inquiries. To be integrated as a main feature in the OIA website renewal. Officially introduced in exchange recruitment orientation materials."}],imageSrc:null,imageCaption:"Favorites + CSV export",imageHint:"Screenshot with starred universities and CSV download button highlighted"}]},selected:{number:"III",title:"Selected Works",intro:"Other projects. Click a card to expand.",projects:[{title:"ECTS Credit Conversion Automation",year:"2025–2026",stack:["GAS","Claude API","python-docx"],body:"Automated the conversion of European (ECTS) transcripts to Yonsei credits. 200+ repetitive cases per semester reduced from 8–10 minutes each to under 30 seconds. Also produced a standard English Certificate template for graduate-school-bound exchange alumni.",imageCaption:"ECTS conversion spreadsheet",imageHint:"Google Sheets screenshot with Yonsei credits auto-populated"},{title:"OIA Website Renewal",year:"2026",stack:["React","TypeScript","Netlify"],body:'In a development environment dominated by legacy constraints, I, as a planner, directly built a React mockup and delivered it alongside a development requirements document. Restructured main stats to "Since 1966 · 80+ Partner Countries · 740+ Partner Universities" and unfolded the history timeline as scroll interaction. Mockup and requirements doc became the baseline for the actual renewal project.',imageCaption:"Hero of yonsei-oia.netlify.app",imageHint:"Screenshot of the mockup site's Hero + 3-stat section"},{title:"Partner University Database",year:"2026",stack:["Excel","Google Sheets","openpyxl","Claude Code"],body:"Standardized agreement data for 740+ partner universities into a 27-column schema. 8 public columns vs 19 internal-management columns, color-coded. Dropdown validation on key fields. Designed to extend to website embedding and expiry notification automation.",imageCaption:"27-column DB schema",imageHint:"Color-coded Excel header — public and internal columns distinguishable"},{title:"President Macron Lecture Operations",year:"2026",stack:["French Delegation","Protocol","Event Ops"],body:"Led operations for President Macron's special lecture at Yonsei, April 3, 2026. Within 7 weeks, coordinated Élysée Palace, French Embassy, Presidential Security, and 5 internal offices. Personally handled welcome speech, student Q&A design, rehearsals, press releases, PCO private-contract justification. 169 domestic press hits, extensive French coverage.",imageCaption:"The event at Gakdang Hall",imageHint:"One public-safe photo from the event — venue overview or welcome speech moment"}]},experience:{number:"IV",title:"Experience & Education",roles:[{org:"Yonsei University, Office of International Affairs",position:"Europe Region Exchange Program Manager",period:"Nov 2025 – Present",bullets:["Lead exchange program strategy and operations across 105 European partner universities","Executed end-to-end operations for President Macron's special lecture at Yonsei (April 2026) within 7 weeks","Drove automation initiative — Flask, GAS, React, D3.js, Claude Code","Planned and secured funding for European benchmarking trip (Sciences Po, UCL, LSE)"]},{org:"Yonsei University, Office of International Affairs",position:"YISS/WAY International Program Manager",period:"Jan 2024 – Oct 2025",bullets:["Ran YISS/WAY 40th anniversary program (Suno AI theme song, 110K+ social media views)","Full short-program operations — invoicing, HTML email, registration validation, academic calendar","EAIE Sweden 2025, partner visits in Norway and France"]}],education:[{school:"Yonsei Graduate School of AI Convergence",degree:"M.S. in AI Computing",period:"Sep 2025 – Present",bullets:["Team project: RAG-based exchange review retrieval system","NLP Study Group — presented ReAct paper, positioning my email triage system as field implementation"]},{school:"Yonsei University",degree:"B.A. in French Language & Literature",period:"Graduated Aug 2013",bullets:[]}]},skills:{number:"V",title:"Skills",groups:[{heading:"AI & Development",items:"Python · Flask · Google Apps Script · Claude API · Claude Code · React · TypeScript · D3.js · Chart.js · HTML/CSS/JS · Git · Netlify"},{heading:"Product & Planning",items:"Service Design · User Research · KPI Design · Cross-functional Coordination · Technical Documentation · AI PoC Ideation & Delivery"},{heading:"Data & Automation",items:"Google Sheets · Excel · Data Visualization (D3.js, Chart.js, Tableau) · Workflow Automation · API Integration"},{heading:"Domain",items:"International Education · European University Partnerships · Government Liaison · Event Management (VVIP Protocol) · Multilingual Communication"},{heading:"Languages",items:"Korean (Native) · English (Professional) · French (Intermediate)"}]},contact:{number:"VI",title:"Contact",heading:"Open to new conversations.",email:"sachoi@yonsei.ac.kr",linkedin:"linkedin.com/in/seoah-choi",linkedinUrl:"https://linkedin.com/in/seoah-choi"},footer:{copyright:"© 2026 Céline Choi · Seo-Ah Choi (최서아)"}},rc=K.createContext(null);function Df({children:e}){const[t,n]=K.useState("ko"),r=t==="ko"?Of:Rf,l=()=>n(i=>i==="ko"?"en":"ko");return u.jsx(rc.Provider,{value:{lang:t,t:r,toggle:l},children:e})}function vt(){const e=K.useContext(rc);if(!e)throw new Error("useLang must be used within LangProvider");return e}function Mf(){const{t:e}=vt();return u.jsxs("div",{className:"chapter-inner hero-inner",children:[u.jsx("div",{className:"hero-eyebrow font-italic-serif",children:e.meta.nameRoman}),u.jsx("h1",{className:"hero-headline font-display",children:e.meta.tagline}),u.jsx("p",{className:"hero-sub",children:e.meta.subtitle}),u.jsx("div",{className:"hero-stats",children:e.hero.stats.map((t,n)=>u.jsxs("div",{className:"hero-stat",children:[u.js
